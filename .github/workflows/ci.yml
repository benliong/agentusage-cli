name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          key: ci-${{ matrix.target }}

      - name: Install LLVM (for rquickjs bindgen)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y llvm-dev libclang-dev clang

      - name: fmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy -- -D warnings

      - name: test
        run: cargo test
        env:
          # Skip keyring on Linux CI (no secret service daemon)
          CARGO_FEATURE_MOCK_KEYRING: "1"
